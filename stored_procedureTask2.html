<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task2Stored</title>

    <style>
        body {

            background-color: #f4f6f9;

            padding: 20px;

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        .section {
            background: #ffffff;
            padding: 25px;

            border-radius: 8px;

        }

            color: #34495e;
            margin-bottom: 20px;
        }

        .image-block {
            text-align: center;
            margin-bottom: 20px;
        }

        .image-block img {
            max-width: 100%;
            height: auto;   
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .label {
            font-weight: bold;
            margin: 15px 0 8px;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<h1>MySQL Stored Procedure</h1>

<div class="section">

    <div class="image-block">

        <img src="https://github.com/triztanacedo01/task2StoredProcedure/blob/main/task2/SQL%20Code.png?raw=true" alt="View1 Code">
    </div>
</div>

<div class="section">
    <h2>Output</h2>
